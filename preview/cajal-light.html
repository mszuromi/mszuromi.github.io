<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Matthew Szuromi — concept: Cajal ink on paper (light)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  :root{ --paper:#f1e7d0; --ink:#2c2316; --muted:#6f5d40; --accent:#8a4524; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'EB Garamond',Georgia,serif;background:var(--paper);color:var(--ink);overflow-x:hidden}
  #sky{position:fixed;inset:0;width:100vw;height:100vh;display:block;z-index:0}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(105deg, rgba(241,231,208,.92) 0%, rgba(241,231,208,.72) 32%, rgba(241,231,208,.25) 60%, rgba(241,231,208,0) 86%)}
  .page{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;padding:30px clamp(26px,5vw,68px)}
  .brand{font-family:'Cormorant Garamond';font-weight:600;font-size:1.5rem;color:var(--ink)}
  nav a{font-family:'EB Garamond';color:var(--muted);text-decoration:none;margin-left:26px;font-size:1.02rem;transition:color .25s}
  nav a:hover{color:var(--ink)} nav a.on{color:var(--accent)}
  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 clamp(26px,5vw,68px);max-width:1180px}
  .eyebrow{font-family:'EB Garamond';font-style:italic;color:var(--accent);font-size:1.18rem;margin-bottom:18px}
  h1{font-family:'Cormorant Garamond';font-weight:600;font-size:clamp(3.6rem,9.5vw,7.6rem);line-height:.95;letter-spacing:-.005em;margin-bottom:12px;color:var(--ink)}
  .role{font-size:1.18rem;color:var(--muted);margin-bottom:24px}
  .role a{color:var(--ink)}
  .lede{font-size:clamp(1.18rem,2.1vw,1.5rem);line-height:1.5;max-width:34ch;color:#473a26;margin-bottom:36px}
  .btns{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
  .btn{font-family:'EB Garamond';font-weight:500;font-size:1.08rem;padding:13px 30px;border-radius:2px;text-decoration:none;transition:.2s}
  .b1{color:#f4ecd9;background:var(--accent)}
  .b1:hover{background:#9d5530}
  .b2{color:var(--ink);border:1px solid rgba(138,69,36,.4)}
  .b2:hover{border-color:var(--accent);background:rgba(138,69,36,.07)}
</style>
</head>
<body>
  <canvas id="sky" aria-hidden="true"></canvas>
  <div class="veil"></div>
  <div class="page">
    <header>
      <div class="brand">Matthew Szuromi</div>
      <nav><a class="on" href="../index.html">Home</a><a href="../research.html">Research</a><a href="../cv.html">CV</a><a href="../aboutme.html">About&nbsp;Me</a></nav>
    </header>
    <section class="hero">
      <div class="eyebrow">Theoretical &amp; computational neuroscience</div>
      <h1>Matthew<br>Szuromi</h1>
      <p class="role">PhD Student · Boston University</p>
      <p class="lede">Using tools from mathematics and physics to understand how neural systems behave, learn, and break down.</p>
      <div class="btns"><a class="btn b1" href="mailto:mszuromi@bu.edu">Get in touch</a><a class="btn b2" href="../research.html">Read my research</a></div>
    </section>
  </div>

<script>
(function(){
  var cvs=document.getElementById('sky'), ctx=cvs.getContext('2d');
  var W,H,DPR,SS=2, frame=0, built=false;
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  // ink-on-paper palette: E = sepia, fires warm; I = slate, fires cool
  var INK='74,56,32', EACT='120,46,18', ESTAIN='158,74,30',
      IINK='58,74,104', IACT='30,52,108', ISTAIN='44,72,140';
  var neurons=[], edges=[], pending=[], paper=null, base=null;
  var mouse={x:-9999,y:-9999,on:false,t:-999};
  function R(a,b){return a+Math.random()*(b-a);}
  function fit(){ DPR=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight;
    cvs.style.width=W+'px'; cvs.style.height=H+'px'; cvs.width=W*DPR; cvs.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }

  function grow(x,y,ang,len,w,depth,segs,bb){
    if(depth<=0||len<3) return;
    var ex=x+Math.cos(ang)*len, ey=y+Math.sin(ang)*len;
    var mx=(x+ex)/2,my=(y+ey)/2, perp=ang+Math.PI/2, off=R(-1,1)*len*0.26;
    var cx=mx+Math.cos(perp)*off, cy=my+Math.sin(perp)*off;
    segs.push({x1:x,y1:y,cx:cx,cy:cy,x2:ex,y2:ey,w:w});
    bb.mnx=Math.min(bb.mnx,x,ex,cx);bb.mny=Math.min(bb.mny,y,ey,cy);bb.mxx=Math.max(bb.mxx,x,ex,cx);bb.mxy=Math.max(bb.mxy,y,ey,cy);
    var nb = depth>1 ? (Math.random()<.86?2:1) : 1;
    for(var i=0;i<nb;i++){ var na=ang+(nb>1?(i?0.45:-0.45):0)*R(.6,1)+R(-.2,.2); grow(ex,ey,na,len*R(.66,.8),w*0.68,depth-1,segs,bb); }
  }
  function pyramidal(scale, apicalLen){
    var segs=[], bb={mnx:0,mny:0,mxx:0,mxy:0};
    var x=0,y=0,w=2.1*scale,segL=13*scale,steps=Math.max(3,Math.round(apicalLen/segL)),ang=-Math.PI/2;
    for(var i=0;i<steps;i++){
      var na=ang+R(-.09,.09), ex=x+Math.cos(na)*segL, ey=y+Math.sin(na)*segL;
      var mx=(x+ex)/2,my=(y+ey)/2,perp=na+Math.PI/2,off=R(-1,1)*segL*0.16;
      segs.push({x1:x,y1:y,cx:mx+Math.cos(perp)*off,cy:my+Math.sin(perp)*off,x2:ex,y2:ey,w:w});
      bb.mnx=Math.min(bb.mnx,x,ex);bb.mny=Math.min(bb.mny,y,ey);bb.mxx=Math.max(bb.mxx,x,ex);bb.mxy=Math.max(bb.mxy,y,ey);
      if(i>1 && i<steps-1 && Math.random()<.66) grow(ex,ey,na+(Math.random()<.5?1:-1)*R(.7,1.1), segL*R(1.1,1.8), w*.62,3,segs,bb);
      x=ex;y=ey;w*=0.93;ang=na;
    }
    var tuft=Math.round(R(4,6));
    for(var t=0;t<tuft;t++) grow(x,y,-Math.PI/2+R(-1,1)*0.95, segL*R(1.4,2.3), w*1.25, 4, segs, bb);
    var nb=Math.round(R(5,7));
    for(var b=0;b<nb;b++) grow(0,0, R(0.28,Math.PI-0.28), segL*R(1.6,2.5), 1.55*scale, 4, segs, bb);
    return {segs:segs,bb:bb,soma:'pyr',sc:scale};
  }
  function stellate(scale){
    var segs=[],bb={mnx:0,mny:0,mxx:0,mxy:0}, n=Math.round(R(7,10));
    for(var i=0;i<n;i++) grow(0,0, i/n*6.2832+R(-.3,.3), 11*scale*R(1.1,1.7), 1.4*scale, 4, segs, bb);
    return {segs:segs,bb:bb,soma:'stel',sc:scale};
  }
  // active=false -> resting ink; active=true -> firing ink (thicker, warmer/cooler, drawn over base)
  function sprite(ar, active, col){
    var bb=ar.bb, pad=active?12:9, w=(bb.mxx-bb.mnx)+pad*2, h=(bb.mxy-bb.mny)+pad*2;
    var c=document.createElement('canvas'); c.width=Math.ceil(w*SS); c.height=Math.ceil(h*SS);
    var g=c.getContext('2d'); g.scale(SS,SS); g.translate(pad-bb.mnx, pad-bb.mny); g.lineCap='round'; g.lineJoin='round';
    for(var i=0;i<ar.segs.length;i++){ var s=ar.segs[i];
      g.beginPath(); g.moveTo(s.x1,s.y1); g.quadraticCurveTo(s.cx,s.cy,s.x2,s.y2);
      if(active){
        g.strokeStyle='rgba('+col+',0.28)'; g.lineWidth=s.w*3.0; g.stroke();
        g.strokeStyle='rgba('+col+',0.96)'; g.lineWidth=s.w*1.5; g.stroke();
      } else {
        var al=Math.max(.3,Math.min(.82,.36+s.w*.24));
        g.strokeStyle='rgba('+col+','+al+')'; g.lineWidth=s.w; g.stroke();
      }
    }
    var sc=ar.sc;
    g.fillStyle='rgba('+col+',1)';
    if(ar.soma==='pyr'){ g.beginPath(); g.moveTo(0,-4.4*sc); g.lineTo(3.5*sc,3.2*sc); g.lineTo(-3.5*sc,3.2*sc); g.closePath(); g.fill(); }
    else { g.beginPath(); g.arc(0,0,3*sc,0,6.2832); g.fill(); }
    return {c:c, ox:(pad-bb.mnx), oy:(pad-bb.mny), w:c.width/SS, h:c.height/SS};
  }

  function buildPaper(){
    var c=document.createElement('canvas'); c.width=W*DPR; c.height=H*DPR;
    var g=c.getContext('2d'); g.scale(DPR,DPR);
    g.fillStyle='#f1e7d0'; g.fillRect(0,0,W,H);
    var washes=[[0.22,0.24,'201,172,124'],[0.84,0.72,'205,176,128'],[0.62,0.12,'214,190,146'],[0.1,0.85,'196,168,120']];
    for(var i=0;i<washes.length;i++){ var b=washes[i], gx=b[0]*W, gy=b[1]*H, rr=Math.max(W,H)*R(.4,.6);
      var gr=g.createRadialGradient(gx,gy,0,gx,gy,rr); gr.addColorStop(0,'rgba('+b[2]+',0.14)'); gr.addColorStop(1,'rgba('+b[2]+',0)');
      g.fillStyle=gr; g.fillRect(0,0,W,H); }
    var vg=g.createRadialGradient(W*0.5,H*0.5,Math.min(W,H)*0.18, W*0.5,H*0.5,Math.max(W,H)*0.72);
    vg.addColorStop(0,'rgba(120,90,52,0)'); vg.addColorStop(1,'rgba(120,90,52,0.15)');
    g.fillStyle=vg; g.fillRect(0,0,W,H);
    for(var s=0;s<240;s++){ var x=Math.random()*W,y=Math.random()*H,r=R(.4,1.6);
      g.fillStyle='rgba(120,92,56,'+R(.03,.11)+')'; g.beginPath(); g.arc(x,y,r,0,6.2832); g.fill(); }
    return c;
  }

  function genNeurons(){
    neurons=[];
    var L=[
      {y0:0.00,y1:0.085,t:'stel',n:Math.round(W/180)+2,sc:[.32,.5]},
      {y0:0.11,y1:0.33, t:'pyr', n:Math.round(W/80),   sc:[.5,.72], ap:[0.10,0.18]},
      {y0:0.35,y1:0.47, t:'stel',n:Math.round(W/100),  sc:[.42,.62]},
      {y0:0.50,y1:0.70, t:'pyr', n:Math.round(W/135),  sc:[.8,1.12], ap:[0.34,0.46]},
      {y0:0.73,y1:0.90, t:'pyr', n:Math.round(W/140),  sc:[.55,.8],  ap:[0.18,0.28]}
    ];
    for(var li=0;li<L.length;li++){ var ly=L[li];
      for(var k=0;k<ly.n;k++){
        var sc=R(ly.sc[0],ly.sc[1]);
        var ar = ly.t==='pyr' ? pyramidal(sc, R(ly.ap[0],ly.ap[1])*H) : stellate(sc);
        var nx=R(0.03,0.99), ny=R(ly.y0,ly.y1);
        neurons.push({nx:nx, ny:ny, x:nx*W, y:ny*H, base:sprite(ar,false,INK), active:sprite(ar,true,EACT),
          q:R(0,.6), act:0, cool:0, dim:0.55+sc*0.4, type:'e', fcol:EACT, stain:ESTAIN});
      }
    }
    var nI=Math.round(neurons.length*0.22);
    for(var ii=0;ii<nI;ii++){
      var isc=R(.4,.62), iar=stellate(isc);
      var inx=R(0.04,0.98), iny=R(0.12,0.9);
      neurons.push({nx:inx, ny:iny, x:inx*W, y:iny*H, base:sprite(iar,false,IINK), active:sprite(iar,true,IACT),
        q:R(0,.6), act:0, cool:0, dim:0.74+isc*0.3, type:'i', fcol:IACT, stain:ISTAIN});
    }
    for(var z=0;z<4;z++){ var zi=Math.floor(Math.random()*neurons.length); neurons[zi].q=R(.96,1); neurons[zi].cool=R(0,45); }
    built=true;
  }
  function buildEdges(){
    edges=[]; pending=[];
    for(var i=0;i<neurons.length;i++){
      var d=[];
      for(var j=0;j<neurons.length;j++) if(j!==i){ var dx=neurons[j].x-neurons[i].x, dy=neurons[j].y-neurons[i].y; d.push({j:j,d2:dx*dx+dy*dy}); }
      d.sort(function(a,b){return a.d2-b.d2;});
      var deg=2+(Math.random()<.45?1:0);
      for(var m=0;m<deg&&m<d.length;m++){ var j2=d[m].j;
        if(!edges.some(function(e){return (e.a===i&&e.b===j2)||(e.a===j2&&e.b===i);})){
          var A=neurons[i],B=neurons[j2],mx=(A.x+B.x)/2,my=(A.y+B.y)/2,ang=Math.atan2(B.y-A.y,B.x-A.x)+Math.PI/2,off=R(-1,1)*Math.sqrt(d[m].d2)*0.12;
          edges.push({a:i,b:j2,cx:mx+Math.cos(ang)*off,cy:my+Math.sin(ang)*off,act:0,col:INK});
        }
      }
    }
  }
  function layout(){
    fit();
    if(!built) genNeurons(); else { for(var i=0;i<neurons.length;i++){ var n=neurons[i]; n.x=n.nx*W; n.y=n.ny*H; } }
    paper=buildPaper(); buildEdges(); bake();
  }
  function bake(){
    base=document.createElement('canvas'); base.width=W*DPR; base.height=H*DPR;
    var g=base.getContext('2d'); g.scale(DPR,DPR);
    g.drawImage(paper,0,0,W,H); g.lineCap='round';
    for(var e=0;e<edges.length;e++){ var E=edges[e],A=neurons[E.a],B=neurons[E.b];
      g.strokeStyle='rgba('+INK+',0.14)'; g.lineWidth=0.7; g.beginPath(); g.moveTo(A.x,A.y); g.quadraticCurveTo(E.cx,E.cy,B.x,B.y); g.stroke(); }
    for(var i=0;i<neurons.length;i++){ var n=neurons[i]; g.globalAlpha=n.dim; g.drawImage(n.base.c,n.x-n.base.ox,n.y-n.base.oy,n.base.w,n.base.h); g.globalAlpha=1; }
  }
  function fire(i){
    var n=neurons[i]; n.act=1; n.q=0; n.cool=R(70,130);
    var w = n.type==='i' ? -0.26 : 0.12;
    for(var e=0;e<edges.length;e++){ var E=edges[e]; if(E.a===i||E.b===i){ E.act=1; E.col=n.fcol; pending.push({to:(E.a===i?E.b:E.a), w:w, at:frame+Math.round(R(16,30))}); } }
  }
  function step(){
    frame++;
    var mi = mouse.on ? Math.max(0, 1-(frame-mouse.t)/50) : 0;
    for(var i=0;i<neurons.length;i++){ var n=neurons[i];
      n.q += (n.type==='i'?0.00032:0.0002)+Math.random()*0.0002; if(n.act>0) n.act*=0.95; if(n.cool>0) n.cool--;
      if(mi>0){ n.q += 0.0006*mi; var dx=n.x-mouse.x, dy=n.y-mouse.y, md=Math.sqrt(dx*dx+dy*dy); if(md<190){ var f=1-md/190; n.q += f*f*0.13*mi; } }
      if(n.q>=1 && n.cool<=0) fire(i);
    }
    for(var e=0;e<edges.length;e++) if(edges[e].act>0) edges[e].act*=0.9;
    for(var p=pending.length-1;p>=0;p--) if(pending[p].at<=frame){ var tn=neurons[pending[p].to]; tn.q += pending[p].w; if(tn.q<-0.5) tn.q=-0.5; pending.splice(p,1); }
  }
  function draw(){
    ctx.clearRect(0,0,W,H); ctx.drawImage(base,0,0,W,H);
    ctx.lineCap='round';
    for(var e=0;e<edges.length;e++){ var E=edges[e]; if(E.act>0.03){ var A=neurons[E.a],B=neurons[E.b];
      ctx.strokeStyle='rgba('+(E.col||INK)+','+(E.act*0.6)+')'; ctx.lineWidth=0.8+E.act*1.3;
      ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.quadraticCurveTo(E.cx,E.cy,B.x,B.y); ctx.stroke(); } }
    for(var i=0;i<neurons.length;i++){ var n=neurons[i]; if(n.act>0.03){
      var rr=24+n.act*16, st=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,rr);
      st.addColorStop(0,'rgba('+n.stain+','+(n.act*0.26)+')'); st.addColorStop(1,'rgba('+n.stain+',0)');
      ctx.fillStyle=st; ctx.fillRect(n.x-rr,n.y-rr,rr*2,rr*2);
      ctx.globalAlpha=Math.min(1,n.act); ctx.drawImage(n.active.c, n.x-n.active.ox, n.y-n.active.oy, n.active.w, n.active.h); ctx.globalAlpha=1;
    } }
  }
  function loop(){ step(); draw(); requestAnimationFrame(loop); }

  var _rt,_lw=window.innerWidth,_lh=window.innerHeight;
  window.addEventListener('resize', function(){ var w=window.innerWidth,h=window.innerHeight; if(w===_lw&&Math.abs(h-_lh)<140)return; clearTimeout(_rt); _rt=setTimeout(function(){_lw=window.innerWidth;_lh=window.innerHeight;layout();},220); });
  window.addEventListener('mousemove', function(e){ mouse.x=e.clientX; mouse.y=e.clientY; mouse.on=true; mouse.t=frame; });
  window.addEventListener('mouseout', function(){ mouse.on=false; });
  window.addEventListener('click', function(e){ if(e.clientY>window.innerHeight)return; var best=-1,bd=1e9; for(var i=0;i<neurons.length;i++){ var dx=neurons[i].x-e.clientX, dy=neurons[i].y-e.clientY, d=dx*dx+dy*dy; if(d<bd){bd=d;best=i;} } if(best>=0&&bd<110000&&neurons[best]&&neurons[best].cool<=0) fire(best); });
  cvs.addEventListener('touchmove', function(e){ var t=e.touches[0]; if(t){ mouse.x=t.clientX; mouse.y=t.clientY; mouse.on=true; mouse.t=frame; } }, {passive:true});

  layout();
  if(reduce){ for(var i=0;i<44;i++) step(); draw(); } else loop();
})();
</script>
</body>
</html>
