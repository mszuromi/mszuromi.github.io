<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Matthew Szuromi — concept: Cajal / Cosmogramma</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root{ --cream:#f3ead4; --gold:#e2b878; --muted:#b3a07f; --ink:#06050d; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'EB Garamond',Georgia,serif;background:var(--ink);color:var(--cream);overflow-x:hidden}
  #sky{position:fixed;inset:0;width:100vw;height:100vh;display:block;z-index:0}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(105deg, rgba(6,5,13,.92) 0%, rgba(6,5,13,.72) 32%, rgba(6,5,13,.28) 60%, rgba(6,5,13,0) 86%)}
  .page{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;padding:30px clamp(26px,5vw,68px)}
  .brand{font-family:'Cormorant Garamond';font-weight:600;font-size:1.5rem;letter-spacing:.01em;color:var(--cream)}
  nav a{font-family:'EB Garamond';color:var(--muted);text-decoration:none;margin-left:26px;font-size:1.02rem;letter-spacing:.02em;transition:color .25s}
  nav a:hover{color:var(--cream)} nav a.on{color:var(--gold)}
  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 clamp(26px,5vw,68px);max-width:1180px}
  .eyebrow{font-family:'EB Garamond';font-style:italic;color:var(--gold);font-size:1.18rem;letter-spacing:.02em;margin-bottom:18px;opacity:.92}
  h1{font-family:'Cormorant Garamond';font-weight:600;font-size:clamp(3.6rem,9.5vw,7.6rem);line-height:.95;letter-spacing:-.005em;margin-bottom:22px;color:var(--cream)}
  .lede{font-size:clamp(1.18rem,2.1vw,1.5rem);line-height:1.5;max-width:33ch;color:#d8cbac;margin-bottom:36px;font-weight:400}
  .btns{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
  .btn{font-family:'EB Garamond';font-weight:500;font-size:1.08rem;padding:13px 30px;border-radius:2px;text-decoration:none;transition:.2s;letter-spacing:.02em}
  .b1{color:#241803;background:var(--gold)}
  .b1:hover{background:#eecb93}
  .b2{color:var(--cream);border:1px solid rgba(226,184,120,.4)}
  .b2:hover{border-color:var(--gold);background:rgba(226,184,120,.08)}
  .hint{margin-top:42px;font-family:'EB Garamond';font-style:italic;font-size:1rem;color:var(--muted);display:flex;align-items:center;gap:10px}
  .spark{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px 2px rgba(226,184,120,.8);animation:bre 3s ease-in-out infinite}
  @keyframes bre{0%,100%{opacity:.4}50%{opacity:1}}
  @media (prefers-reduced-motion: reduce){.spark{animation:none}}
</style>
</head>
<body>
  <canvas id="sky"></canvas>
  <div class="veil"></div>
  <div class="page">
    <header>
      <div class="brand">Matthew Szuromi</div>
      <nav>
        <a class="on" href="../index.html">Home</a>
        <a href="../research.html">Research</a>
        <a href="../cv.html">CV</a>
        <a href="../aboutme.html">About&nbsp;Me</a>
      </nav>
    </header>
    <section class="hero">
      <div class="eyebrow">Theoretical &amp; computational neuroscience</div>
      <h1>Matthew<br>Szuromi</h1>
      <p class="lede">Mathematics and theoretical physics, brought to how neural systems compute, learn, and break down.</p>
      <div class="btns">
        <a class="btn b1" href="mailto:mszuromi@bu.edu">Get in touch</a>
        <a class="btn b2" href="../research.html">Read my research</a>
      </div>
      <div class="hint"><span class="spark"></span> a living network — move through it, or click to send a signal</div>
    </section>
  </div>

<script>
(function(){
  var cvs=document.getElementById('sky'), ctx=cvs.getContext('2d');
  var W,H,DPR,SS=2;
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var GOLD='226,184,120', WGOLD='255,240,205';
  var neurons=[], edges=[], signals=[], neb=null, mouse={x:-9999,y:-9999,on:false};
  function R(a,b){return a+Math.random()*(b-a);}

  function fit(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth; H=window.innerHeight;
    cvs.style.width=W+'px'; cvs.style.height=H+'px';
    cvs.width=W*DPR; cvs.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  }

  // ---- Cajal-style dendritic arbor (relative to soma at 0,0) ----
  function grow(x,y,ang,len,w,depth,segs,bb){
    if(depth<=0||len<4) return;
    var ex=x+Math.cos(ang)*len, ey=y+Math.sin(ang)*len;
    var mx=(x+ex)/2,my=(y+ey)/2, perp=ang+Math.PI/2, off=R(-1,1)*len*0.34;
    var cx=mx+Math.cos(perp)*off, cy=my+Math.sin(perp)*off;
    segs.push({x1:x,y1:y,cx:cx,cy:cy,x2:ex,y2:ey,w:w});
    bb.mnx=Math.min(bb.mnx,x,ex,cx);bb.mny=Math.min(bb.mny,y,ey,cy);
    bb.mxx=Math.max(bb.mxx,x,ex,cx);bb.mxy=Math.max(bb.mxy,y,ey,cy);
    var nb = depth>3 ? 2 : (Math.random()<0.82?2:1);
    for(var i=0;i<nb;i++){
      var na=ang + (nb>1?(i?0.5:-0.5):0)*R(.6,1.0) + R(-.25,.25);
      grow(ex,ey,na,len*R(.66,.8),w*0.7,depth-1,segs,bb);
    }
  }
  function buildArbor(scale){
    var segs=[], bb={mnx:0,mny:0,mxx:0,mxy:0};
    var prim=Math.round(R(5,7)), a0=R(0,6.28);
    for(var i=0;i<prim;i++){
      var ang=a0 + i/prim*6.2832 + R(-.3,.3);
      grow(0,0,ang,R(26,42)*scale,1.7*scale,Math.random()<.5?5:4,segs,bb);
    }
    return {segs:segs,bb:bb};
  }
  function sprite(arbor,glow){
    var bb=arbor.bb, pad=glow?30:10;
    var w=(bb.mxx-bb.mnx)+pad*2, h=(bb.mxy-bb.mny)+pad*2;
    var c=document.createElement('canvas'); c.width=Math.ceil(w*SS); c.height=Math.ceil(h*SS);
    var g=c.getContext('2d'); g.scale(SS,SS); g.translate(pad-bb.mnx, pad-bb.mny);
    g.lineCap='round'; g.lineJoin='round';
    if(glow){ g.shadowColor='rgba('+WGOLD+',.9)'; g.shadowBlur=9; }
    for(var i=0;i<arbor.segs.length;i++){
      var s=arbor.segs[i];
      var al = glow ? 0.85 : Math.max(.28, Math.min(.8, .3+s.w*.26));
      g.strokeStyle='rgba('+(glow?WGOLD:GOLD)+','+al+')';
      g.lineWidth=s.w*(glow?1.9:1);
      g.beginPath(); g.moveTo(s.x1,s.y1); g.quadraticCurveTo(s.cx,s.cy,s.x2,s.y2); g.stroke();
    }
    g.shadowBlur=0;
    g.fillStyle='rgba('+(glow?WGOLD:'240,205,140')+',1)';
    g.beginPath(); g.arc(0,0,glow?5.5:3.6,0,6.2832); g.fill();
    return {c:c, ox:(pad-bb.mnx), oy:(pad-bb.mny), w:c.width/SS, h:c.height/SS};
  }

  // ---- cosmic nebula (baked once) ----
  function buildNebula(){
    var c=document.createElement('canvas'); c.width=W*DPR; c.height=H*DPR;
    var g=c.getContext('2d'); g.scale(DPR,DPR);
    g.fillStyle='#06050d'; g.fillRect(0,0,W,H);
    var blobs=[[0.74,0.34,'58,29,110'],[0.86,0.66,'110,31,85'],[0.52,0.2,'26,33,96'],[0.66,0.8,'15,58,68'],[0.93,0.46,'120,60,40']];
    for(var i=0;i<blobs.length;i++){
      var b=blobs[i], gx=b[0]*W, gy=b[1]*H, rr=Math.max(W,H)*R(.36,.52);
      var gr=g.createRadialGradient(gx,gy,0,gx,gy,rr);
      gr.addColorStop(0,'rgba('+b[2]+',0.5)'); gr.addColorStop(1,'rgba('+b[2]+',0)');
      g.fillStyle=gr; g.fillRect(0,0,W,H);
    }
    for(var s=0;s<420;s++){
      var x=Math.random()*W, y=Math.random()*H, r=Math.random()<.92?R(.3,1):R(1,1.8);
      var a=R(.15,.7), tone=Math.random()<.7?'255,246,224':'205,190,255';
      g.fillStyle='rgba('+tone+','+a+')'; g.beginPath(); g.arc(x,y,r,0,6.2832); g.fill();
    }
    return c;
  }

  function build(){
    fit();
    neb=buildNebula();
    neurons=[]; edges=[]; signals=[];
    var cols=W<760?3:(W<1200?4:5), rows=W<760?4:3, N=cols*rows;
    var k=0;
    for(var r=0;r<rows;r++) for(var c2=0;c2<cols;c2++){
      var scale=R(.55,1.25);
      var ar=buildArbor(scale);
      var px=(c2+0.5)/cols*W + R(-1,1)*W/cols*0.32;
      var py=(r+0.5)/rows*H + R(-1,1)*H/rows*0.3;
      neurons.push({x:px,y:py,vx:R(-.07,.07),vy:R(-.07,.07),rot:R(0,6.28),vrot:R(-.0006,.0006),
        scale:scale,breath:R(0,6.28),
        base:sprite(ar,false), glow:sprite(ar,true),
        q:R(0,.7),act:0,cool:0, dim:0.5+scale*0.5});
      k++;
    }
    for(var i=0;i<neurons.length;i++){
      var d=[];
      for(var j=0;j<neurons.length;j++) if(j!==i){
        var dx=neurons[j].x-neurons[i].x, dy=neurons[j].y-neurons[i].y;
        d.push({j:j,d2:dx*dx+dy*dy});
      }
      d.sort(function(a,b){return a.d2-b.d2;});
      var deg=2+(Math.random()<.5?1:0);
      for(var m=0;m<deg&&m<d.length;m++){
        var j2=d[m].j;
        if(!edges.some(function(e){return (e.a===i&&e.b===j2)||(e.a===j2&&e.b===i);})){
          var A=neurons[i],B=neurons[j2], mx=(A.x+B.x)/2,my=(A.y+B.y)/2;
          var ang=Math.atan2(B.y-A.y,B.x-A.x)+Math.PI/2, off=R(-1,1)*Math.sqrt(d[m].d2)*0.16;
          edges.push({a:i,b:j2,cx:mx+Math.cos(ang)*off,cy:my+Math.sin(ang)*off});
        }
      }
    }
    for(var z=0;z<3;z++){ var zi=Math.floor(Math.random()*neurons.length); neurons[zi].q=R(.95,1); neurons[zi].cool=R(0,45); }
  }

  function fire(n,idx){
    n.act=1; n.q=0; n.cool=R(120,200);
    for(var e=0;e<edges.length;e++){
      var E=edges[e];
      if((E.a===idx||E.b===idx) && signals.length<200){
        var from=idx, to=(E.a===idx?E.b:E.a);
        signals.push({f:from,t:to,cx:E.cx,cy:E.cy,p:0,sp:R(.006,.011)});
      }
    }
  }
  function qbez(ax,ay,cx,cy,bx,by,t){var u=1-t;return {x:u*u*ax+2*u*t*cx+t*t*bx, y:u*u*ay+2*u*t*cy+t*t*by};}

  function step(){
    for(var i=0;i<neurons.length;i++){
      var n=neurons[i];
      n.x+=n.vx; n.y+=n.vy; n.rot+=n.vrot; n.breath+=0.012;
      if(n.x<-40)n.x=W+40; if(n.x>W+40)n.x=-40; if(n.y<-40)n.y=H+40; if(n.y>H+40)n.y=-40;
      n.q += 0.0013 + Math.random()*0.001;
      if(n.act>0) n.act*=0.965;
      if(n.cool>0) n.cool--;
      if(mouse.on){
        var dx=n.x-mouse.x, dy=n.y-mouse.y, md=Math.sqrt(dx*dx+dy*dy);
        if(md<180) n.q += (1-md/180)*0.03;
      }
      if(n.q>=1 && n.cool<=0) fire(n,i);
    }
    for(var s=signals.length-1;s>=0;s--){
      var S=signals[s]; S.p+=S.sp;
      if(S.p>=1){ var tn=neurons[S.t]; tn.q+=0.6; signals.splice(s,1); }
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.drawImage(neb,0,0,W,H);
    ctx.lineCap='round';
    for(var e=0;e<edges.length;e++){
      var E=edges[e], A=neurons[E.a], B=neurons[E.b];
      ctx.strokeStyle='rgba('+GOLD+',0.10)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.quadraticCurveTo(E.cx,E.cy,B.x,B.y); ctx.stroke();
    }
    for(var i=0;i<neurons.length;i++){
      var n=neurons[i], br=1+Math.sin(n.breath)*0.012;
      ctx.save(); ctx.translate(n.x,n.y); ctx.rotate(n.rot); ctx.scale(br,br);
      ctx.globalAlpha=n.dim;
      ctx.drawImage(n.base.c, -n.base.ox, -n.base.oy, n.base.w, n.base.h);
      ctx.globalAlpha=1;
      if(n.act>0.03){
        ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=Math.min(1,n.act);
        ctx.drawImage(n.glow.c, -n.glow.ox, -n.glow.oy, n.glow.w, n.glow.h);
        ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      }
      ctx.restore();
    }
    ctx.globalCompositeOperation='lighter';
    for(var s=0;s<signals.length;s++){
      var S=signals[s], A=neurons[S.f];
      for(var tr=0;tr<5;tr++){
        var tt=S.p-tr*0.045; if(tt<0)break;
        var pt=qbez(A.x,A.y,S.cx,S.cy,neurons[S.t].x,neurons[S.t].y,tt);
        var a=(1-tr/5)*0.85, rad=2.6-tr*0.35;
        ctx.fillStyle='rgba('+WGOLD+','+a+')';
        ctx.beginPath(); ctx.arc(pt.x,pt.y,Math.max(.5,rad),0,6.2832); ctx.fill();
      }
    }
    ctx.globalCompositeOperation='source-over';
  }

  function loop(){ step(); draw(); requestAnimationFrame(loop); }

  window.addEventListener('resize', build);
  window.addEventListener('mousemove', function(e){ mouse.x=e.clientX; mouse.y=e.clientY; mouse.on=true; });
  window.addEventListener('mouseout', function(){ mouse.on=false; });
  window.addEventListener('click', function(e){
    var best=-1,bd=1e9;
    for(var i=0;i<neurons.length;i++){var dx=neurons[i].x-e.clientX,dy=neurons[i].y-e.clientY,d=dx*dx+dy*dy; if(d<bd){bd=d;best=i;}}
    if(best>=0 && bd<90000 && neurons[best].cool<=0) fire(neurons[best],best);
  });
  cvs.addEventListener('touchmove', function(e){var t=e.touches[0]; if(t){mouse.x=t.clientX;mouse.y=t.clientY;mouse.on=true;}},{passive:true});

  build();
  if(reduce){ for(var i=0;i<6;i++) step(); draw(); } else { loop(); }
})();
</script>
</body>
</html>
